<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Collaborative Boards</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">TaskFlow</div>
        <div id="user-nav">
            <button class="btn" onclick="location.href='/login.html'">Login</button>
        </div>
    </nav>

    <div style="display: flex;">
        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Projects</h3>
                <button class="btn" style="padding: 4px 8px;" onclick="openProjectModal()">+</button>
            </div>
            <div id="project-list">
                <!-- Projects injected here -->
            </div>
        </div>

        <main style="flex: 1;">
            <div id="board-header" style="padding: 2rem 5% 0; display: none;">
                <h2 id="current-project-name" style="font-size: 2rem; margin-bottom: 0.5rem;">Select a Project</h2>
                <button class="btn" onclick="openTaskModal()">+ Add Task</button>
            </div>

            <div class="board-container" id="board" style="display: none;">
                <div class="column" id="todo-col">
                    <div class="column-header"><span class="column-title">To Do</span></div>
                    <div class="task-list" id="todo-tasks"></div>
                </div>
                <div class="column" id="doing-col">
                    <div class="column-header"><span class="column-title">In Progress</span></div>
                    <div class="task-list" id="doing-tasks"></div>
                </div>
                <div class="column" id="done-col">
                    <div class="column-header"><span class="column-title">Done</span></div>
                    <div class="task-list" id="done-tasks"></div>
                </div>
            </div>

            <div id="welcome-message" style="padding: 4rem; text-align: center;">
                <h1 style="font-size: 3rem; margin-bottom: 1rem;">Welcome to TaskFlow</h1>
                <p style="color: var(--text-muted); font-size: 1.2rem;">Select or create a project to get started.</p>
            </div>
        </main>
    </div>

    <!-- Create Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Create New Project</h2>
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" id="project-name-input" placeholder="e.g. Website Overhaul">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="project-desc-input" rows="3" placeholder="What is this project about?"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn" style="background: transparent;" onclick="closeProjectModal()">Cancel</button>
                <button class="btn" onclick="createProject()">Create</button>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Add New Task</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="task-title-input" placeholder="Fix login bug">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="task-desc-input" rows="3"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn" style="background: transparent;" onclick="closeTaskModal()">Cancel</button>
                <button class="btn" onclick="createTask()">Add Task</button>
            </div>
        </div>
    </div>

    <!-- Task Details Modal (for comments/status) -->
    <div id="task-detail-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h6 id="detail-task-id" style="display:none"></h6>
            <h2 id="detail-title">Task Details</h2>
            <p id="detail-desc" style="color: var(--text-muted); margin: 1rem 0;"></p>
            
            <div class="form-group">
                <label>Status</label>
                <select id="detail-status" onchange="updateTaskStatus()">
                    <option value="todo">To Do</option>
                    <option value="doing">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>

            <div style="margin-top: 2rem;">
                <h3>Comments</h3>
                <div id="comment-list" style="margin: 1rem 0; max-height: 200px; overflow-y: auto;"></div>
                <div class="form-group" style="display:flex; gap: 0.5rem; margin-top: 1rem;">
                    <input type="text" id="comment-input" placeholder="Add a comment...">
                    <button class="btn" onclick="addComment()">Send</button>
                </div>
            </div>

            <div style="text-align: right; margin-top: 1rem;">
                <button class="btn" onclick="closeTaskDetailModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
