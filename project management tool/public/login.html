<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container { max-width: 450px; margin: 100px auto; background: var(--card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary); cursor:pointer" onclick="location.href='/'">TaskFlow</div>
    </nav>

    <div class="auth-container">
        <div id="login-form-box">
            <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%">Login</button>
            </form>
            <p style="margin-top: 1.5rem; color: var(--text-muted); text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="#" onclick="showRegister()" style="color: var(--primary); text-decoration: none;">Register</a>
            </p>
        </div>

        <div id="register-form-box" style="display: none;">
            <h2 style="margin-bottom: 2rem;">Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required placeholder="johndoe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%">Register</button>
            </form>
            <p style="margin-top: 1.5rem; color: var(--text-muted); text-align: center; font-size: 0.9rem;">
                Already have an account? <a href="#" onclick="showLogin()" style="color: var(--primary); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>

    <script>
        function showRegister() { document.getElementById('login-form-box').style.display = 'none'; document.getElementById('register-form-box').style.display = 'block'; }
        function showLogin() { document.getElementById('login-form-box').style.display = 'block'; document.getElementById('register-form-box').style.display = 'none'; }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            if (res.ok) { alert('Success! Please login.'); showLogin(); }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) window.location.href = '/';
            else alert('Invalid credentials');
        });
    </script>
</body>
</html>
